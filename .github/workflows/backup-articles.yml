name: Article Events

on:
  repository_dispatch:
    types: [article.created, article.updated, article.deleted]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: yazn-108/murakkaz-articles-backup
          token: ${{ secrets.BACKUP_REPO_TOKEN }}
          path: backup

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node backup/scripts/backup-events-handler.js
        env:
          EVENT_TYPE: ${{ github.event.action }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}

      - run: |
          cd backup
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add articles.json
          git commit -m "${{ github.event.action }}" || echo "no changes"
          git push
